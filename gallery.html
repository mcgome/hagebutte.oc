<!DOCTYPE html>

<title>Gallery</title>

<style>

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Background */
body {
  background-image: url("background.jpg"); /* CHANGE */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: Arial, sans-serif;
}

/* Push gallery down (top 1/3 empty feel) */
.spacer {
  height: 30vh;
}

/* Gallery wrapper (adds left/right breathing space) */
.gallery-wrapper {
  padding: 0 80px 60px 80px; /* LEFT + RIGHT SPACE */
}

/* Masonry layout */
.gallery {
  column-count: 5;          /* ~5 per row feel */
  column-gap: 15px;
}

/* Images */
.gallery img {
  width: 100%;
  margin-bottom: 15px;
  border-radius: 10px;
  display: block;
  break-inside: avoid;
  cursor: pointer;
  transition: 0.25s;
}

/* Slight hover feedback (very subtle) */
.gallery img:hover {
  transform: scale(1.02);
}

/* Fullscreen viewer */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

/* Fullscreen image */
.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* Close hint */
.lightbox::after {
  content: "Click anywhere to close";
  position: absolute;
  bottom: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.7;
}

</style>
</head>

<script>

/* Open fullscreen */
function openLightbox(img) {

}

/* Close fullscreen */
function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
