<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Gallery</title>

<style>

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Background */
body {
  background-image: url("background.jpg"); /* CHANGE */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: Arial, sans-serif;
}

/* Push gallery down (top 1/3 empty feel) */
.spacer {
  height: 30vh;
}

/* Gallery wrapper (adds left/right breathing space) */
.gallery-wrapper {
  padding: 0 80px 60px 80px; /* LEFT + RIGHT SPACE */
}

/* Masonry layout */
.gallery {
  column-count: 5;          /* ~5 per row feel */
  column-gap: 15px;
}

/* Images */
.gallery img {
  width: 100%;
  margin-bottom: 15px;
  border-radius: 10px;
  display: block;
  break-inside: avoid;
  cursor: pointer;
  transition: 0.25s;
}

/* Slight hover feedback (very subtle) */
.gallery img:hover {
  transform: scale(1.02);
}

/* Fullscreen viewer */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

/* Fullscreen image */
.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

/* Close hint */
.lightbox::after {
  content: "Click anywhere to close";
  position: absolute;
  bottom: 20px;
  color: white;
  font-size: 14px;
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="spacer"></div>

<div class="gallery-wrapper">
  <div class="gallery">

    <img src="Illustration 8.png" onclick="openLightbox(this)">
    <img src="Illustration7.png" onclick="openLightbox(this)">
    <img src="img3.jpg" onclick="openLightbox(this)">
    <img src="img4.jpg" onclick="openLightbox(this)">
    <img src="img5.jpg" onclick="openLightbox(this)">
    <img src="img6.jpg" onclick="openLightbox(this)">
    <img src="img7.jpg" onclick="openLightbox(this)">
    <img src="img8.jpg" onclick="openLightbox(this)">

  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>

/* Open fullscreen */
function openLightbox(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

/* Close fullscreen */
function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
