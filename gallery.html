<!DOCTYPE html>

<title>Gallery</title>

<style>

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Background (FIXED) */
body {
  background-image: url("galleryb.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: scroll;
  font-family: Arial, sans-serif;
}

/* Spacer */
.spacer {
  height: 30vh;
}

/* Wrapper */
.gallery-wrapper {
  padding: 0 60px 60px 60px;
  max-width: 1400px;
  margin: 0 auto;
}

/* Masonry */
.gallery {
  column-count: 5;
  column-gap: 15px;
}

/* Images */
.gallery img {
  width: 100%;
  margin-bottom: 15px;
  border-radius: 10px;
  display: block;
  break-inside: avoid;

  cursor: pointer;
  transition: transform 0.2s ease;
}

/* Hover */
.gallery img:hover {
  transform: scale(1.015);
}

/* Lightbox */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);

  display: none;
  justify-content: center;
  align-items: center;

  z-index: 1000;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.lightbox::after {
  content: "Click anywhere to close";
  position: absolute;
  bottom: 20px;
  color: white;
  font-size: 12px;
  opacity: 0.7;
}

</style>
</head>
