<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hagebutte</title>

<style>

/* Page background */
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    color:white;

    /* replace background.jpg with your image */
    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Title */
h1{
    font-size:60px; /* about 1.5x larger */
    margin-top:80px;
}

/* Subtitle */
p{
    font-size:12px;
}

./* container */
.navigation-container{
    margin-top:120px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

/* box */
.navigation-box{
    width:200px;
    cursor:pointer;
    text-align:center;
}

/* image inside box */
.navigation img{
    width:200px;
    height:120px;
    object-fit:cover;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.6);

    transition:transform 0.2s;
}

/* hover animation */
.navigation img:hover{
    transform:scale(1.05);
}

/* label text */
.label{
    margin-top:10px;
    font-size:18px;
    font-family:Arial;
    color:white;
}
</style>
</head>


<body>

<h1>Welcome to the Hagebutte</h1>
    

<p>This is the page designated for ocs created by gome_2 since 2022. You will find interesting characters, interactions and stories throughout your exploration.</p>

<div class="navigation-container">

<div class="navigation" onclick="goToPage('characters.html')">
<img src="char1.jpg">
</div>

<div class="navigation" onclick="goToPage('settings.html')">
<img src="char2.jpg">
</div>

<div class="navigation" onclick="goToPage('concepts.html')">
<img src="char3.jpg">
</div>

<div class="navigation" onclick="goToPage('gallery.html')">
<img src="char4.jpg">
</div>

<div class="navigation" onclick="goToPage('story.html')">
<img src="char5.jpg">
</div>

</div>


<script>

/* redirect function */

function goToPage(page){
    window.location.href = page;
}

</script>

</body>
</html>
