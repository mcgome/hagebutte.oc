<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My OC Page</title>

<style>

/* Page background */
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    color:white;

    /* replace background.jpg with your image */
    background-image: url("IMG_1645 2.HEIC");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Title */
h1{
    font-size:60px; /* about 1.5x larger */
    margin-top:80px;
}

/* Subtitle */
p{
    font-size:20px;
}

/* Container for icons */
.character-container{
    margin-top:120px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

/* Icon style */
.character{
    width:200px;
    height:120px;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;

    /* shadow */
    box-shadow:0 10px 25px rgba(0,0,0,0.6);

    transition:transform 0.2s;
}

/* hover effect */
.character:hover{
    transform:scale(1.05);
}

/* icon images */
.character img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>


<body>

<h1>Welcome to My OC Page</h1>

<p>This is my art portfolio</p>

<div class="character-container">

<div class="character" onclick="goToPage('character1.html')">
<img src="char1.jpg">
</div>

<div class="character" onclick="goToPage('character2.html')">
<img src="char2.jpg">
</div>

<div class="character" onclick="goToPage('character3.html')">
<img src="char3.jpg">
</div>

<div class="character" onclick="goToPage('character4.html')">
<img src="char4.jpg">
</div>

</div>


<script>

/* redirect function */

function goToPage(page){
    window.location.href = page;
}

</script>

</body>
</html>
