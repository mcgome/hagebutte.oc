<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hagebutte</title>

<style>

/* Page background */
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    color:white;

    /* replace background.jpg with your image */
    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* Title */
h1{
    font-size:60px; /* about 1.5x larger */
    margin-top:80px;
}

/* Subtitle */

.subtitle{
    font-size:20px;
    margin-top:10px;
}


/* Icon row */

.icon-row{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:120px;
}


/* Each icon box */

.icon-box{
    text-align:center;
    cursor:pointer;
}


/* Icon image */

.icon-box img{

    width:180px;
    height:110px;

    object-fit:cover;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.6);

    transition:transform 0.2s;
}


/* Hover animation */

.icon-box img:hover{
    transform:scale(1.05);
}


/* Label under icon */

.icon-label{

    margin-top:10px;

    font-size:18px;

    font-family:Arial;

    color:white;

}

</style>
</head>


<body>


<h1>Welcome to the Hagebutte</h1>

<p class="subtitle">This is the page designated for ocs created by gome_2 since 2022. You will find interesting characters, interactions and stories throughout your exploration.

</p>


<div class="icon-row">

<div class="icon-box" onclick="goToPage('characters.html')">
<img src="characters.jpg">
<div class="icon-label">Characters</div>
</div>

<div class="icon-box" onclick="goToPage('settings.html')">
<img src="settings.jpg">
<div class="icon-label">Settings</div>
</div>

<div class="icon-box" onclick="goToPage('concepts.html')">
<img src="concepts.jpg">
<div class="icon-label">Concepts</div>
</div>

<div class="icon-box" onclick="goToPage('gallery.html')">
<img src="gallery.jpg">
<div class="icon-label">Gallery</div>
</div>

<div class="icon-box" onclick="goToPage('story.html')">
<img src="story.jpg">
<div class="icon-label">Story</div>
</div>

</div>


<script>

function goToPage(page){

window.location.href = page;

}

</script>


</body>
</html>
