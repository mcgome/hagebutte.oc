<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Characters</title>

<style>

/* Page background */
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;

    /* Center the grid vertically */
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100vh;

    background-image:url("characterbackground.jpeg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}


/* Character grid */
.character-grid{
    display:grid;
    grid-template-columns:repeat(2, auto);
    justify-content:center;
    gap:60px;
    /* margin-top removed – now centered with flex */
    margin-left:auto;
    margin-right:auto;
}


/* Image container */
.image-container{
    position:relative;
    width:170px;
    height:170px;
}


/* both images stacked */
.image-container img{
    position:absolute;
    width:170px;
    height:170px;
    object-fit:cover;
    border-radius:15px;

    transition:opacity 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
}


/* hover image hidden */
.image-container .hover{
    opacity:0;
}


/* swap images on hover */
.character-box:hover .hover{
    opacity:1;
}

.character-box:hover .normal{
    opacity:0;
}


/* zoom effect */
.character-box:hover img{
    transform:scale(1.08);
    box-shadow:0 15px 35px rgba(0,0,0,0.8);
}


/* Character label */
.character-label{
    margin-top:10px;
    font-size:18px;
    line-height:1.2;
}


/* Home button */
.home-button{
    position:fixed;
    top:10px;
    left:20px;

    padding:10px 20px;

    font-size:16px;

    border:none;
    border-radius:10px;

    background-color:rgba(0,0,0,0.6);
    color:white;

    cursor:pointer;
    z-index:10; /* keep above everything */
}

.home-button:hover{
    background-color:rgba(0,0,0,0.8);
}

</style>
</head>


<body>


<button class="home-button" onclick="goHome()">Home</button>


<div class="character-grid">


<!-- Character 1 -->
<div class="character-box" onclick="goToPage('osiria.html')">

<div class="image-container">
<img class="normal" src="osiriac.png">
<img class="hover" src="osiriach.png">
</div>

<div class="character-label">Osiria Rose</div>

</div>


<!-- Character 2 -->
<div class="character-box" onclick="goToPage('oasis.html')">

<div class="image-container">
<img class="normal" src="oasisc.png">
<img class="hover" src="oasisch.png">
</div>

<div class="character-label">Oasis</div>

</div>


<!-- Character 3 -->
<div class="character-box" onclick="goToPage('vinia.html')">

<div class="image-container">
<img class="normal" src="viniac.png">
<img class="hover" src="viniach.png">
</div>

<div class="character-label">
Vinia Fred<br>Kirtunsgelmes
</div>

</div>


<!-- Character 4 -->
<div class="character-box" onclick="goToPage('edward.html')">

<div class="image-container">
<img class="normal" src="edwardc.png">
<img class="hover" src="edwardch.png">
</div>

<div class="character-label">Edward Ego</div>

</div>


</div>


<script>

function goToPage(page){
    window.location.href = page;
}

function goHome(){
    window.location.href = "index.html";
}

</script>


</body>
</html>
