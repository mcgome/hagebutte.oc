<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Characters</title>

<style>

/* Page background */

body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;

    background-image:url("characterbackground.jpeg"); /* replace with your image */

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}


/* Grid layout */

.character-grid{

    display:grid;

    grid-template-columns:repeat(2, 220px);

    justify-content:center;

    gap:50px;

    margin-top:120px;

}


/* Character box */

.character-box{
    cursor:pointer;
}


/* Character image */

.character-box img{

    width:170px;
    height:170px;

    object-fit:cover;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.6);

    transition:transform 0.2s;

}

}


/* Hover effect */

.character-box img:hover{
    transform:scale(1.05);
}


/* Label under box */

.character-label{

    margin-top:10px;

    font-size:18px;

}


/* Back button */

.home-button{

    margin-top:100px;

    padding:12px 30px;

    font-size:16px;

    border:none;

    border-radius:10px;

    background-color:rgba(0,0,0,0.6);

    color:white;

    cursor:pointer;

}


.home-button{

    position:fixed;

    top:5px;
    left:20px;

    padding:10px 20px;

    font-size:16px;

    border:none;

    border-radius:10px;

    background-color:rgba(0,0,0,0.6);

    color:white;

    cursor:pointer;

}

.home-button:hover{

    background-color:rgba(0,0,0,0.8);

}

</style>
</head>


<body>


<div class="character-grid">

<div class="character-box" onclick="goToPage('osiria.html')">
<img src="osiriac.png">
<div class="character-label">Osiria Rose</div>
</div>


<div class="character-box" onclick="goToPage('oasis.html')">
<img src="oasisc.png">
<div class="character-label">Oasis</div>
</div>


<div class="character-box" onclick="goToPage('vinia.html')">
<img src="viniac.png">
<div class="character-label">Vinia Fred<br>Kirtunsgelmes</div>
</div>


<div class="character-box" onclick="goToPage('edward.html')">
<img src="edwardc.png">
<div class="character-label">Edward Ego</div>
</div>


</div>


<button class="home-button" onclick="goHome()">Return to Home</button>


<script>

function goToPage(page){

window.location.href = page;

}

function goHome(){

window.location.href = "index.html";

}

</script>


</body>
</html>
