<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Characters</title>
<style>
  /* Reset margins and padding */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
  }

  body {
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    position: relative; /* for absolute positioning of the grid */
    background-image: url("characterbackground.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  /* Character grid – absolutely centered */
  .character-grid {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    grid-template-columns: repeat(2, 170px);
    gap: 60px;
  }

  /* Image container */
  .image-container {
    position: relative;
    width: 170px;
    height: 170px;
  }

  /* Both images stacked */
  .image-container img {
    position: absolute;
    width: 170px;
    height: 170px;
    object-fit: cover;
    border-radius: 15px;
    transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
  }

  /* Hover image hidden by default */
  .image-container .hover {
    opacity: 0;
  }

  /* Swap images on hover */
  .character-box:hover .hover {
    opacity: 1;
  }
  .character-box:hover .normal {
    opacity: 0;
  }

  /* Zoom effect on hover */
  .character-box:hover img {
    transform: scale(1.08);
    box-shadow: 0 15px 35px rgba(0,0,0,0.8);
  }

  /* Character label – wraps inside 170px */
  .character-label {
    margin-top: 10px;
    font-size: 18px;
    line-height: 1.2;
    word-wrap: break-word;
    max-width: 170px;
  }

  /* Home button – fixed top‑left */
  .home-button {
    position: fixed;
    top: 10px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background-color: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    z-index: 10;
  }

  .home-button:hover {
    background-color: rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<button class="home-button" onclick="goHome()">Home</button>

<div class="character-grid">

  <!-- Character 1 -->
  <div class="character-box" onclick="goToPage('osiria.html')">
    <div class="image-container">
      <img class="normal" src="osiriac.png" alt="Osiria Rose normal">
      <img class="hover" src="osiriach.png" alt="Osiria Rose hover">
    </div>
    <div class="character-label">Osiria Rose</div>
  </div>

  <!-- Character 2 -->
  <div class="character-box" onclick="goToPage('oasis.html')">
    <div class="image-container">
      <img class="normal" src="oasisc.png" alt="Oasis normal">
      <img class="hover" src="oasisch.png" alt="Oasis hover">
    </div>
    <div class="character-label">Oasis</div>
  </div>

  <!-- Character 3 -->
  <div class="character-box" onclick="goToPage('vinia.html')">
    <div class="image-container">
      <img class="normal" src="viniac.png" alt="Vinia normal">
      <img class="hover" src="viniach.png" alt="Vinia hover">
    </div>
    <div class="character-label">Vinia Fred<br>Kirtunsgelmes</div>
  </div>

  <!-- Character 4 -->
  <div class="character-box" onclick="goToPage('edward.html')">
    <div class="image-container">
      <img class="normal" src="edwardc.png" alt="Edward normal">
      <img class="hover" src="edwardch.png" alt="Edward hover">
    </div>
    <div class="character-label">Edward Ego</div>
  </div>

</div>

<script>
function goToPage(page) {
  window.location.href = page;
}
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
