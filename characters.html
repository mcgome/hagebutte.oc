<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Characters</title>
<style>
  /* Hard reset – removes all default spacing */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100vh;
  }

  body {
    font-family: Arial, sans-serif;
    color: white;
    background-image: url("characterbackground.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    position: relative;
  }

  /* Wrapper that centers the grid */
  .center-wrapper {
    display: flex;
    justify-content: center; /* center horizontally */
    align-items: center;     /* center vertically */
    width: 100%;
    height: 100vh;
  }

  /* Character grid – flexible and centered */
  .character-grid {
    display: grid;
    grid-template-columns: repeat(2, 170px); /* 2 columns */
    gap: 60px;                               /* spacing between items */
    justify-content: center;                  /* center grid horizontally */
  }

  /* Character box */
  .character-box {
    cursor: pointer;
    text-align: center;
  }

  /* Image container */
  .image-container {
    position: relative;
    width: 170px;
    height: 170px;
  }

  /* Both images stacked */
  .image-container img {
    position: absolute;
    width: 170px;
    height: 170px;
    object-fit: cover;
    border-radius: 15px;
    transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
  }

  /* Hover image hidden initially */
  .image-container .hover {
    opacity: 0;
  }

  /* Swap images on hover */
  .character-box:hover .hover {
    opacity: 1;
  }

  .character-box:hover .normal {
    opacity: 0;
  }

  /* Zoom effect */
  .character-box:hover img {
    transform: scale(1.08);
    box-shadow: 0 15px 35px rgba(0,0,0,0.8);
  }

  /* Character label */
  .character-label {
    margin-top: 10px;
    font-size: 18px;
    line-height: 1.2;
    word-wrap: break-word;
    max-width: 170px;
  }

  /* Home button – fixed */
  .home-button {
    position: fixed;
    top: 10px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background-color: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    z-index: 10;
  }

  .home-button:hover {
    background-color: rgba(0,0,0,0.8);
  }

  /* Optional: responsive for small screens */
  @media (max-width: 400px) {
    .character-grid {
      grid-template-columns: 1fr;
      gap: 40px;
    }
  }
</style>
</head>
<body>

<button class="home-button" onclick="goHome()">Home</button>

<div class="center-wrapper">
  <div class="character-grid">

    <!-- Character 1 -->
    <div class="character-box" onclick="goToPage('osiria.html')">
      <div class="image-container">
        <img class="normal" src="osiriac.png" alt="Osiria Rose normal">
        <img class="hover" src="osiriach.png" alt="Osiria Rose hover">
      </div>
      <div class="character-label">Osiria Rose</div>
    </div>

    <!-- Character 2 -->
    <div class="character-box" onclick="goToPage('oasis.html')">
      <div class="image-container">
        <img class="normal" src="oasisc.png" alt="Oasis normal">
        <img class="hover" src="oasisch.png" alt="Oasis hover">
      </div>
      <div class="character-label">Oasis</div>
    </div>

    <!-- Character 3 -->
    <div class="character-box" onclick="goToPage('vinia.html')">
      <div class="image-container">
        <img class="normal" src="viniac.png" alt="Vinia normal">
        <img class="hover" src="viniach.png" alt="Vinia hover">
      </div>
      <div class="character-label">Vinia Fred<br>Kirtunsgelmes</div>
    </div>

    <!-- Character 4 -->
    <div class="character-box" onclick="goToPage('edward.html')">
      <div class="image-container">
        <img class="normal" src="edwardc.png" alt="Edward normal">
        <img class="hover" src="edwardch.png" alt="Edward hover">
      </div>
      <div class="character-label">Edward Ego</div>
    </div>

  </div>
</div>

<script>
function goToPage(page) {
  window.location.href = page;
}
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
