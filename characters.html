<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Characters</title>

<style>

/* Page background */

body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;

    background-image:url("characterbackground.jpeg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}


/* Character grid */

.character-grid{

    display:grid;

    grid-template-columns:repeat(2, 200px);

    justify-content:center;

    gap:60px;

    margin-top:120px;

}


/* Character image */

.character-box img{

    width:170px;
    height:170px;

    object-fit:cover;

    border-radius:15px;

    transition:transform 0.25s ease, box-shadow 0.25s ease;

}


/* Hover effect */

.character-box img:hover{

    transform:scale(1.08);

    box-shadow:0 15px 35px rgba(0,0,0,0.8);

}


/* Character label */

.character-label{

    margin-top:10px;

    font-size:18px;

    line-height:1.2;

}


/* Home button */

.home-button{

    position:fixed;

    top:10px;
    left:20px;

    padding:10px 20px;

    font-size:16px;

    border:none;

    border-radius:10px;

    background-color:rgba(0,0,0,0.6);

    color:white;

    cursor:pointer;

}

.home-button:hover{

    background-color:rgba(0,0,0,0.8);

}

</style>
</head>


<body>


<button class="home-button" onclick="goHome()">Home</button>


<div class="character-grid">


<div class="character-box" onclick="goToPage('osiria.html')">
<img src="osiriac.png">
<div class="character-label">Osiria Rose</div>
</div>


<div class="character-box" onclick="goToPage('oasis.html')">
<img src="oasisc.png">
<div class="character-label">Oasis</div>
</div>


<div class="character-box" onclick="goToPage('vinia.html')">
<img src="viniac.png">
<div class="character-label">
Vinia Fred<br>Kirtunsgelmes
</div>
</div>


<div class="character-box" onclick="goToPage('edward.html')">
<img src="edwardc.png">
<div class="character-label">Edward Ego</div>
</div>


</div>


<script>

function goToPage(page){
    window.location.href = page;
}

function goHome(){
    window.location.href = "index.html";
}

</script>


</body>
</html>
