<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My Characters</title>

<style>

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Background */
body {
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;

  background-image: url("characterbackground.jpeg"); /* CHANGE */
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* Page title */
h1 {
  margin: 30px 0;
  font-size: 40px;
}

/* Grid layout */
.character-grid {
  display: grid;
  grid-template-columns: repeat(2, 250px);
  gap: 40px;
  justify-content: center;
  margin-top: 40px;
}

/* Character box */
.character {
  text-align: center;
}

/* Image container */
.character-box {
  width: 250px;
  height: 250px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  cursor: pointer;

  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Default image */
.character-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s ease;
}

/* Hover image (hidden initially) */
.character-box img.hover-img {
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
}

/* Hover effect */
.character-box:hover img.hover-img {
  opacity: 1;
}

.character-box:hover img.default-img {
  opacity: 0;
}

/* Character name */
.character p {
  margin-top: 10px;
  font-size: 18px;
}

/* Back button */
.back-btn {
  display: inline-block;
  margin: 50px 0;
  padding: 10px 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.back-btn:hover {
  background: rgba(255,255,255,0.3);
}

</style>
</head>

<body>


<div class="character-grid">

  <!-- Character 1 -->
  <div class="character">
    <div class="character-box">
      <img src="char1.png" class="osiriac.png">
      <img src="char1-hover.png" class="osiriach.png">
    </div>
    <p>Osiria Rose</p>
  </div>

  <!-- Character 2 -->
  <div class="character">
    <div class="character-box">
      <img src="char2.png" class="oasisc.png">
      <img src="char2-hover.png" class="oasisch.png">
    </div>
    <p>Oasis</p>
  </div>

  <!-- Character 3 -->
  <div class="character">
    <div class="character-box">
      <img src="char3.png" class="viniac.png">
      <img src="char3-hover.png" class="viniach.png">
    </div>
    <p>Vinia Fred <br> Kirtunsgelmes</p>
  </div>

  <!-- Character 4 -->
  <div class="character">
    <div class="character-box">
      <img src="char4.png" class="edwardc.png">
      <img src="char4-hover.png" class="edwardch.png">
    </div>
    <p>Edward Ego</p>
  </div>

</div>

<!-- Back to Home -->
<a href="index.html" class="back-btn">← Back to Home</a>

</body>
</html>
