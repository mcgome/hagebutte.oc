<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Characters</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100vh;
  }

  body {
    font-family: Arial, sans-serif;
    color: white;
    background: url("characterbackground.jpeg") center/cover fixed no-repeat;
  }

  .home-button {
    position: fixed;
    top: 10px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background-color: rgba(0,0,0,0.6);
    color: white;
    cursor: pointer;
    z-index: 10;
  }
  .home-button:hover { background-color: rgba(0,0,0,0.8); }

  /* Center wrapper */
  .center-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
  }

  /* Grid container */
  .character-grid {
    display: grid;
    grid-template-columns: repeat(2, 170px);
    gap: 60px;
    justify-content: center; /* ensures grid is horizontally centered */
  }

  /* Character box */
  .character-box {
    text-align: center;
    cursor: pointer;
  }

  .image-container {
    position: relative;
    width: 170px;
    height: 170px;
  }

  .image-container img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    transition: transform 0.25s ease, opacity 0.25s ease, box-shadow 0.25s ease;
  }

  .image-container .hover { opacity: 0; }

  .character-box:hover .hover { opacity: 1; }
  .character-box:hover .normal { opacity: 0; }
  .character-box:hover img {
    transform: scale(1.08);
    box-shadow: 0 15px 35px rgba(0,0,0,0.8);
  }

  .character-label {
    margin-top: 10px;
    font-size: 18px;
    line-height: 1.2;
    text-align: center;
    word-break: break-word;
  }

</style>
</head>
<body>

<button class="home-button" onclick="goHome()">Home</button>

<div class="center-wrapper">
  <div class="character-grid">

    <div class="character-box" onclick="goToPage('osiria.html')">
      <div class="image-container">
        <img class="normal" src="osiriac.png" alt="">
        <img class="hover" src="osiriach.png" alt="">
      </div>
      <div class="character-label">Osiria Rose</div>
    </div>

    <div class="character-box" onclick="goToPage('oasis.html')">
      <div class="image-container">
        <img class="normal" src="oasisc.png" alt="">
        <img class="hover" src="oasisch.png" alt="">
      </div>
      <div class="character-label">Oasis</div>
    </div>

    <div class="character-box" onclick="goToPage('vinia.html')">
      <div class="image-container">
        <img class="normal" src="viniac.png" alt="">
        <img class="hover" src="viniach.png" alt="">
      </div>
      <div class="character-label">Vinia Fred<br>Kirtunsgelmes</div>
    </div>

    <div class="character-box" onclick="goToPage('edward.html')">
      <div class="image-container">
        <img class="normal" src="edwardc.png" alt="">
        <img class="hover" src="edwardch.png" alt="">
      </div>
      <div class="character-label">Edward Ego</div>
    </div>

  </div>
</div>

<script>
function goToPage(page) { window.location.href = page; }
function goHome() { window.location.href = "index.html"; }
</script>

</body>
</html>
