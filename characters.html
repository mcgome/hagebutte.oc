<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>My Characters</title>

<style>

/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Background */
body {
  font-family: Arial, sans-serif;
  text-align: center;
  color: white;

  background-image: url("characterbackground.jpeg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* Title */
h1 {
  margin: 30px 0;
  font-size: 40px;
}

/* Grid */
.character-grid {
  display: grid;
  grid-template-columns: repeat(2, 160px);
  gap: 50px;
  justify-content: center;
  margin-top: 40px;
}

/* Each character */
.character {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Clickable box */
.character-box {
  width: 150px;
  height: 150px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  cursor: pointer;

  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.3s;
}

/* Slight zoom on hover */
.character-box:hover {
  transform: scale(1.05);
}

/* Images */
.character-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  transition: opacity 0.4s ease;
}

/* Default visible */
.default-img {
  opacity: 1;
}

/* Hover hidden initially */
.hover-img {
  opacity: 0;
}

/* Hover swap */
.character-box:hover .default-img {
  opacity: 0;
}

.character-box:hover .hover-img {
  opacity: 1;
}

/* Name */
.character p {
  margin-top: 10px;
  font-size: 16px;
}

/* Remove link styling */
.character a {
  text-decoration: none;
  color: white;
}

/* Back button */
.back-btn {
  display: inline-block;
  margin: 50px 0;
  padding: 10px 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.back-btn:hover {
  background: rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<h1>My Original Characters</h1>

<div class="character-grid">

  <!-- Character 1 -->
  <div class="character">
    <a href="osiria.html">
      <div class="character-box">
        <img src="char1.png" class="default-img">
        <img src="char1-hover.png" class="hover-img">
      </div>
      <p>Osiria Rose</p>
    </a>
  </div>

  <!-- Character 2 -->
  <div class="character">
    <a href="oasis.html">
      <div class="character-box">
        <img src="char2.png" class="default-img">
        <img src="char2-hover.png" class="hover-img">
      </div>
      <p>Oasis</p>
    </a>
  </div>

  <!-- Character 3 -->
  <div class="character">
    <a href="vinia.html">
      <div class="character-box">
        <img src="char3.png" class="default-img">
        <img src="char3-hover.png" class="hover-img">
      </div>
      <p>Vinia Fred<br>Kirtunsgelmes</p>
    </a>
  </div>

  <!-- Character 4 -->
  <div class="character">
    <a href="edward.html">
      <div class="character-box">
        <img src="char4.png" class="default-img">
        <img src="char4-hover.png" class="hover-img">
      </div>
      <p>Edward Ego</p>
    </a>
  </div>

</div>

<!-- Back to Home -->
<a href="index.html" class="back-btn">← Back to Home</a>

</body>
</html>
